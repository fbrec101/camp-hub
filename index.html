<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REC101 Camp Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--fbs:#e63946;--fcs:#457b9d;--d2:#2a9d8f;--d3:#e9c46a;--naia:#8338ec;--bg:#0D0D0D;--card:#1E1A16;--text:#F7F2E8;--muted:#a89a86;--border:#3D2810;--accent:#C4620A;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2)}
body{font-family:'Roboto Condensed',sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
h1,.school-name,.popup-school,.badge,.view-toggle button,.card-header{font-family:'Oswald',sans-serif}
header{background:#141110;border-bottom:1px solid var(--border);padding:12px 24px;position:sticky;top:0;z-index:1000}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
h1{font-size:1.4rem;font-weight:700;white-space:nowrap;color:var(--accent);text-transform:uppercase;letter-spacing:1px}
h1 span{font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0}
.tagline{font-size:.78rem;color:var(--muted);font-style:italic;margin-top:2px}
.mission{font-size:.75rem;color:var(--muted);margin-top:4px}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:10px 14px 10px 38px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;background:var(--card);color:var(--text);outline:none;transition:border .2s}
.search-box input::placeholder{color:var(--muted)}
.search-box input:focus{border-color:var(--accent)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
.view-toggle{display:flex;background:var(--card);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.view-toggle button{padding:8px 18px;border:none;background:transparent;font-size:.85rem;cursor:pointer;font-weight:500;transition:all .2s;color:var(--muted)}
.view-toggle button.active{background:var(--accent);color:#fff}
.filters-bar{max-width:1400px;margin:0 auto;padding:8px 24px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;border-bottom:2px solid var(--accent)}
.filters-bar select{padding:7px 28px 7px 10px;border:1px solid var(--border);border-radius:6px;font-size:.83rem;background:var(--card);color:var(--text);-webkit-appearance:none;appearance:none;cursor:pointer;width:170px;font-family:'Roboto Condensed',sans-serif}
.filters-bar select:focus{border-color:var(--accent);outline:none}
.clear-btn{padding:7px 12px;border:none;background:transparent;color:var(--accent);font-size:.83rem;cursor:pointer;font-weight:500}
.stats{color:var(--muted);font-size:.83rem;margin-left:auto;white-space:nowrap}
#map-container{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column}
#map{flex:1;min-height:0;height:calc(100vh - 170px);border-radius:var(--radius);border:1px solid var(--border);margin-top:8px}
.map-legend{display:flex;gap:20px;padding:8px 0 4px;flex-wrap:wrap;justify-content:center;flex-shrink:0}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.85rem;color:var(--text);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.5px}
.legend-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--card);box-shadow:0 0 0 1px var(--border)}
#grid-container{max-width:1400px;margin:0 auto;padding:16px 24px;display:none}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.camp-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px;box-shadow:var(--shadow);border-left:4px solid var(--muted);transition:transform .15s,box-shadow .15s}
.camp-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.4)}
.camp-card[data-div="FBS"]{border-left-color:var(--fbs)}
.camp-card[data-div="FCS"]{border-left-color:var(--fcs)}
.camp-card[data-div="D2"]{border-left-color:var(--d2)}
.camp-card[data-div="D3"]{border-left-color:var(--d3)}
.camp-card[data-div="NAIA"]{border-left-color:var(--naia)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.school-name{font-size:1.05rem;font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:600;color:#fff;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.badge-FBS{background:var(--fbs)}.badge-FCS{background:var(--fcs)}.badge-D2{background:var(--d2)}.badge-D3{background:var(--d3)}.badge-NAIA{background:var(--naia)}
.conference{font-size:.82rem;color:var(--muted);margin-bottom:10px}
.camp-list{list-style:none;margin-bottom:12px}
.camp-list li{font-size:.85rem;padding:3px 0;display:flex;align-items:baseline;gap:6px}
.camp-list li::before{content:"";display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--muted);flex-shrink:0;margin-top:6px}
.camp-dates{font-size:.8rem;color:var(--muted)}
.card-footer{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.reg-link{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;background:var(--accent);color:#fff;text-decoration:none;border-radius:6px;font-size:.8rem;font-weight:500;transition:background .2s}
.reg-link:hover{background:#a85208}
.twitter-link{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;background:var(--border);color:var(--text);text-decoration:none;border-radius:6px;font-size:.8rem;font-weight:500}
.no-results{text-align:center;padding:60px 20px;color:var(--muted);font-size:1.1rem;grid-column:1/-1}
.leaflet-popup-content-wrapper{border-radius:var(--radius)!important;box-shadow:var(--shadow)!important;background:var(--card)!important;color:var(--text)!important}
.leaflet-popup-tip{background:var(--card)!important}
.leaflet-popup-content{margin:14px 16px!important;font-family:'Roboto Condensed',sans-serif!important;min-width:220px}
.leaflet-popup-close-button{color:var(--muted)!important}
.leaflet-popup-close-button:hover{color:var(--text)!important}
.popup-school{font-size:1rem;font-weight:600;margin-bottom:4px;color:var(--accent)}
.popup-conf{font-size:.8rem;color:var(--muted);margin-bottom:8px}
.popup-camps{list-style:none;font-size:.82rem;margin-bottom:8px}
.popup-camps li{padding:2px 0}
.popup-link{display:inline-block;margin-top:4px;padding:5px 12px;background:var(--accent);color:#fff;text-decoration:none;border-radius:5px;font-size:.78rem}
@media(max-width:768px){.header-inner{gap:10px}h1{font-size:1.1rem;width:100%}.search-box{min-width:0}#map{height:calc(100vh - 200px);min-height:300px}.card-grid{grid-template-columns:1fr}.filters-bar{padding:8px 16px}.filters-bar select{width:calc(50% - 6px);flex:none}#map-container,#grid-container{padding:0 16px}.stats{width:100%;margin-left:0}}
</style>
</head>

const DIV_COLORS={FBS:'#e63946',FCS:'#457b9d',D2:'#2a9d8f',D3:'#e9c46a',NAIA:'#8338ec'};

function mergeSchools(data) {
  const m = new Map();
  for (const e of data) {
    const k = e.school_name;
    if (m.has(k)) {
      const x = m.get(k);
      x.camp_types = [...new Set([...x.camp_types, ...e.camp_types])];
      x.dates = [...new Set([...x.dates, ...e.dates])];
      if (!x.registration_url && e.registration_url) x.registration_url = e.registration_url;
      if (!x.twitter_handle && e.twitter_handle) x.twitter_handle = e.twitter_handle;
    } else {
      m.set(k, {...e, camp_types: [...e.camp_types], dates: [...e.dates]});
    }
  }
  return [...m.values()];
}

const mergedData = mergeSchools(CAMPS_DATA);

function populateFilters() {
  const cs = document.getElementById('filter-conference');
  const ts = document.getElementById('filter-camp-type');
  [...new Set(mergedData.map(d => d.conference))].sort().forEach(c => {
    const o = document.createElement('option'); o.value = c; o.textContent = c; cs.appendChild(o);
  });
  [...new Set(mergedData.flatMap(d => d.camp_types))].sort().forEach(t => {
    const o = document.createElement('option'); o.value = t; o.textContent = t; ts.appendChild(o);
  });
}

function getFilters() {
  return {
    division: document.getElementById('filter-division').value,
    conference: document.getElementById('filter-conference').value,
    campType: document.getElementById('filter-camp-type').value,
    month: document.getElementById('filter-month').value,
    search: document.getElementById('search').value.toLowerCase().trim()
  };
}

function matchesFilters(s, f) {
  if (f.division && s.division !== f.division) return false;
  if (f.conference && s.conference !== f.conference) return false;
  if (f.campType && !s.camp_types.includes(f.campType)) return false;
  if (f.month && !s.dates.some(d => d.toLowerCase().startsWith(f.month.toLowerCase()))) return false;
  if (f.search) {
    const h = (s.school_name + ' ' + s.conference + ' ' + s.division + ' ' + s.camp_types.join(' ')).toLowerCase();
    if (!h.includes(f.search)) return false;
  }
  return true;
}

function getFiltered() {
  const f = getFilters();
  return mergedData.filter(s => matchesFilters(s, f));
}

function updateConferences() {
  const div = document.getElementById('filter-division').value;
  const cs = document.getElementById('filter-conference');
  const cur = cs.value;
  cs.innerHTML = '<option value="">All Conferences</option>';
  const src = div ? mergedData.filter(d => d.division === div) : mergedData;
  const confs = [...new Set(src.map(d => d.conference))].sort();
  confs.forEach(c => {
    const o = document.createElement('option'); o.value = c; o.textContent = c; cs.appendChild(o);
  });
  if (confs.includes(cur)) cs.value = cur;
}

function normalizeUrl(u) {
  if (!u) return null;
  u = u.trim();
  if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
  return u;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let map, markerLayer;
function initMap() {
  map = L.map('map', {scrollWheelZoom: true}).setView([39.5, -96], 5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '\u00a9 OSM \u00a9 CARTO', maxZoom: 18
  }).addTo(map);
  markerLayer = L.layerGroup().addTo(map);
}

function updateMap() {
  markerLayer.clearLayers();
  const filtered = getFiltered();
  for (const s of filtered) {
    const c = SCHOOL_COORDS[s.school_name];
    if (!c) continue;
    const color = DIV_COLORS[s.division] || '#999';
    const mk = L.circleMarker(c, {radius: 7, fillColor: color, color: '#0D0D0D', weight: 2, fillOpacity: .9});
    const url = normalizeUrl(s.registration_url);
    const camps = s.camp_types.map(t => '<li>' + escHtml(t) + '</li>').join('');
    const dates = s.dates.map(d => escHtml(d)).join(', ');
    const link = url ? '<a class="popup-link" href="' + escHtml(url) + '" target="_blank" rel="noopener">Register \u2192</a>' : '';
    const tw = s.twitter_handle ? '<div style="font-size:.78rem;margin-top:4px">' + escHtml(s.twitter_handle) + '</div>' : '';
    mk.bindPopup(
      '<div class="popup-school">' + escHtml(s.school_name) + '</div>' +
      '<span class="badge badge-' + s.division + '">' + s.division + '</span>' +
      '<div class="popup-conf">' + escHtml(s.conference) + '</div>' +
      '<ul class="popup-camps">' + camps + '</ul>' +
      '<div style="font-size:.78rem;color:#a89a86">' + dates + '</div>' +
      link + tw
    );
    mk.addTo(markerLayer);
  }
  updateStats(filtered.length);
}

function updateGrid() {
  const grid = document.getElementById('card-grid');
  const filtered = getFiltered();
  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">No camps match your filters</div>';
    updateStats(0);
    return;
  }
  let h = '';
  for (const s of filtered) {
    const url = normalizeUrl(s.registration_url);
    const camps = s.camp_types.map(t => '<li><strong>' + escHtml(t) + '</strong></li>').join('');
    const link = url ? '<a class="reg-link" href="' + escHtml(url) + '" target="_blank" rel="noopener">Register \u2192</a>' : '';
    const tw = s.twitter_handle ? '<a class="twitter-link" href="https://x.com/' + s.twitter_handle.replace('@','') + '" target="_blank" rel="noopener">' + escHtml(s.twitter_handle) + '</a>' : '';
    h += '<div class="camp-card" data-div="' + s.division + '">' +
      '<div class="card-header"><div class="school-name">' + escHtml(s.school_name) + '</div><span class="badge badge-' + s.division + '">' + s.division + '</span></div>' +
      '<div class="conference">' + escHtml(s.conference) + '</div>' +
      '<ul class="camp-list">' + camps + '</ul>' +
      '<div class="camp-dates" style="margin-bottom:10px">' + s.dates.map(d => escHtml(d)).join(' \u2022 ') + '</div>' +
      '<div class="card-footer">' + link + tw + '</div></div>';
  }
  grid.innerHTML = h;
  updateStats(filtered.length);
}

function updateStats(n) {
  document.getElementById('stats').textContent = n + ' of ' + mergedData.length + ' schools';
}

let currentView = 'map';
function setView(v) {
  currentView = v;
  document.getElementById('btn-map').classList.toggle('active', v === 'map');
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  document.getElementById('map-container').style.display = v === 'map' ? 'block' : 'none';
  document.getElementById('grid-container').style.display = v === 'grid' ? 'block' : 'none';
  if (v === 'map') { map.invalidateSize(); updateMap(); }
  else updateGrid();
}

function clearFilters() {
  document.getElementById('filter-division').value = '';
  document.getElementById('filter-conference').value = '';
  document.getElementById('filter-camp-type').value = '';
  document.getElementById('filter-month').value = '';
  document.getElementById('search').value = '';
  updateConferences();
  applyFilters();
}

function applyFilters() {
  if (currentView === 'map') updateMap();
  else updateGrid();
}

let searchTimer;
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 250);
});

['filter-division','filter-conference','filter-camp-type','filter-month'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    if (id === 'filter-division') updateConferences();
    applyFilters();
  });
});

populateFilters();
initMap();
updateMap();
setTimeout(() => { map.invalidateSize(); }, 100);
window.addEventListener('load', () => { map.invalidateSize(); });

</script>
